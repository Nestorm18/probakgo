name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o probakgo_linux_amd64 .

      - name: Build server Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o probakgo_linux_arm64 .

      - name: Build client Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o probakgo-client_linux_amd64 ./client/

      - name: Build client Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o probakgo-client_linux_arm64 ./client/

      - name: Create checksums
        run: |
          sha256sum \
            probakgo_linux_amd64 \
            probakgo_linux_arm64 \
            probakgo-client_linux_amd64 \
            probakgo-client_linux_arm64 \
            > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            probakgo_linux_amd64
            probakgo_linux_arm64
            probakgo-client_linux_amd64
            probakgo-client_linux_arm64
            SHA256SUMS
