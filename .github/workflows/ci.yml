name: CI

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Check version sync
        id: version
        run: |
          SERVER_VER=$(grep -oP 'var version = "\K[^"]+' main.go)
          CLIENT_VER=$(grep -oP 'var version = "\K[^"]+' client/main.go)
          WINDOWS_CLIENT_VER=$(grep -oP 'var version = "\K[^"]+' client-windows/main.go)
          if [ "$SERVER_VER" != "$CLIENT_VER" ] || [ "$SERVER_VER" != "$WINDOWS_CLIENT_VER" ]; then
            echo "ERROR: server version ($SERVER_VER), client version ($CLIENT_VER), windows client version ($WINDOWS_CLIENT_VER) - keep them in sync"
            exit 1
          fi
          echo "Version sync OK: $SERVER_VER"
          echo "version=$SERVER_VER" >> "$GITHUB_OUTPUT"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: v${{ needs.build.outputs.version }}
      sha: ${{ github.sha }}
