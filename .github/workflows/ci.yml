name: CI

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check version sync
        run: |
          SERVER_VER=$(grep -oP 'var version = "\K[^"]+' main.go)
          CLIENT_VER=$(grep -oP 'var version = "\K[^"]+' client/main.go)
          if [ "$SERVER_VER" != "$CLIENT_VER" ]; then
            echo "ERROR: server version ($SERVER_VER) != client version ($CLIENT_VER) — keep them in sync"
            exit 1
          fi
          echo "Version sync OK: $SERVER_VER"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SERVER_VER=$(grep -oP 'var version = "\K[^"]+' main.go)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "")
          if [ -n "$LATEST_TAG" ] && [ "$SERVER_VER" = "$LATEST_TAG" ]; then
            echo "ERROR: version $SERVER_VER already released — bump var version in main.go and client/main.go before pushing to master"
            exit 1
          fi

          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=$SERVER_VER" -o probakgo_linux_amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=$SERVER_VER" -o probakgo-client_linux_amd64 ./client/
          sha256sum probakgo_linux_amd64 probakgo-client_linux_amd64 > SHA256SUMS

          gh release create "v$SERVER_VER" \
            --generate-notes \
            probakgo_linux_amd64 \
            probakgo-client_linux_amd64 \
            SHA256SUMS
          echo "Released v$SERVER_VER"
