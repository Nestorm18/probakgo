<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Probakgo - 2FA</title>
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-panel-left">
    <div class="login-panel-left-inner">
      <div class="login-app-logo"><i class="bi bi-shield-lock-fill"></i></div>
      <div class="login-headline">Verificación<br>en dos pasos</div>
      <div class="login-subhead">Introduce el código temporal de tu aplicación 2FA.</div>
    </div>
  </div>
  <div class="login-panel-right">
    <div class="login-form-wrap">
      <div class="login-form-title">Código 2FA</div>
      <div class="login-form-sub">{{.Username}}</div>
      <div class="login-card">
        {{if .Error}}
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-4 py-2">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span style="font-size:.82rem">{{.Error}}</span>
        </div>
        {{end}}
        <form method="POST" action="/login/2fa">
          {{ .CSRFField }}
          <div class="mb-4">
            <label class="form-label">Código de 6 dígitos</label>
            <input type="text" name="code" class="form-control text-center" inputmode="numeric" autocomplete="one-time-code" autofocus required maxlength="6" pattern="[0-9]{6}" style="font-size:1.2rem;letter-spacing:.18rem;font-family:'DM Mono',monospace">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-shield-check me-1"></i>Verificar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
