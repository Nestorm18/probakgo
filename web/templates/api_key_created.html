{{define "api_key_created.html"}}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Key creada — Probaky</title>
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page" style="align-items:center;justify-content:center">
  <div style="width:100%;max-width:420px;padding:1rem">
    <div class="login-card">
      <div class="text-center mb-4">
        <div style="width:52px;height:52px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:.875rem;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin:0 auto 1rem;box-shadow:0 6px 20px rgba(217,119,6,.25)">
          <i class="bi bi-key-fill"></i>
        </div>
        <h4 class="fw-bold mb-1" style="color:var(--txt-primary);font-size:1rem">API Key creada</h4>
        <p style="color:var(--txt-muted);font-size:.82rem;margin:0">Copia esta key ahora — no se volverá a mostrar.</p>
      </div>
      <div class="mb-3">
        <div style="font-size:.68rem;color:var(--txt-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem">Nombre</div>
        <div class="fw-semibold" style="color:var(--txt-primary)">{{.Name}}</div>
      </div>
      <div class="mb-4">
        <div style="font-size:.68rem;color:var(--txt-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem">Key completa</div>
        <div class="input-group">
          <input type="text" class="form-control" id="keyVal" value="{{.Key}}" readonly
                 style="font-family:'DM Mono',monospace;font-size:.8rem">
          <button class="btn btn-secondary" id="copyBtn" title="Copiar">
            <i class="bi bi-clipboard"></i>
          </button>
        </div>
      </div>
      <a href="/api-keys" class="btn btn-primary w-100">
        <i class="bi bi-check-lg me-1"></i>Ya la guardé, continuar
      </a>
    </div>
  </div>
</div>

<button class="theme-toggle" id="themeToggle" title="Cambiar tema">
  <i class="bi" id="themeIcon"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('copyBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(document.getElementById('keyVal').value);
    this.innerHTML = '<i class="bi bi-check-lg"></i>';
    setTimeout(() => this.innerHTML = '<i class="bi bi-clipboard"></i>', 2000);
  });
  const themeIcon = document.getElementById('themeIcon');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.setAttribute('data-bs-theme', t);
    themeIcon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  });
</script>
</body>
</html>
{{end}}
