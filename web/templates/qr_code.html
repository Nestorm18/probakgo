{{block "page_title" .}}QR Code - Probaky{{end}}
{{block "page_heading" .}}QR Code - {{.Key.Name}}{{end}}
{{block "page_actions" .}}
<a href="/api-keys" class="btn btn-sm btn-secondary">
  <i class="bi bi-arrow-left me-1"></i>Volver
</a>
{{end}}
{{block "page_content" .}}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card text-center">
      <div class="card-body" style="padding:2rem">
        <div class="mb-3">
          <div style="font-size:.68rem;color:var(--txt-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem">API Key</div>
          <div class="fw-semibold" style="color:var(--txt-primary)">{{.Key.Name}}</div>
          <span class="key-type-badge mobile mt-1 d-inline-block">mobile</span>
        </div>
        <div style="background:#fff;border-radius:.75rem;padding:1rem;display:inline-block;margin-bottom:1rem;border:1px solid var(--card-border)">
          <img src="/api-keys/{{.APIID}}/qr-image"
               style="display:block;max-width:220px;width:100%" alt="QR Code">
        </div>
        <p style="font-size:.78rem;color:var(--txt-muted);margin:0">
          Escanea con la app móvil de Probaky para configurar el acceso automáticamente.
        </p>
      </div>
    </div>
  </div>
</div>
{{end}}
