{{block "page_title" .}}Sistema - Probakgo{{end}}
{{block "page_heading" .}}Sistema{{end}}
{{block "page_actions" .}}
<a href="/settings" class="btn btn-sm btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
{{end}}
{{block "page_content" .}}

<div class="row">
  <div class="col-12 col-lg-7">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-globe2 me-2" style="color:var(--clr-accent)"></i>URL pública de Probakgo
      </div>
      <div class="card-body">
        <form method="POST" action="/settings/system">
          {{.CSRFField}}
          <div class="mb-3">
            <label class="form-label">URL para instalación de clientes</label>
            <input type="url" name="public_api_url" class="form-control" value="{{.Config.PublicAPIURL}}" placeholder="https://probakgo.midominio.com:36748">
            <div class="form-text">Si está vacía, los comandos usan la URL con la que accedes al panel.</div>
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Guardar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{{end}}
